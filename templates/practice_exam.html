<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Exam - CBT System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow-light: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-medium: 0 20px 60px rgba(0, 0, 0, 0.15);
            --shadow-heavy: 0 32px 80px rgba(0, 0, 0, 0.2);
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            color: #1a1a1a;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 119, 198, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .main-content {
            flex: 1;
            padding: 1rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Header */
        .exam-header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-light);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .exam-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .exam-title i {
            color: #43e97b;
        }

        .header-stats {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #666;
        }

        .stat-value {
            background: var(--success-gradient);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }

        /* Question Card */
        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: var(--shadow-medium);
            animation: slideIn 0.5s ease-out;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .question-number {
            background: var(--success-gradient);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 500;
            line-height: 1.6;
            color: #1a1a1a;
            margin-bottom: 2rem;
        }

        /* Options */
        .options-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            min-height: 56px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option-item:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .option-item.selected {
            background: var(--success-gradient);
            border-color: #43e97b;
            color: white;
            box-shadow: var(--shadow-medium);
        }

        .option-item.correct {
            background: rgba(67, 233, 123, 0.1);
            border-color: #43e97b;
        }

        .option-item.incorrect {
            background: rgba(245, 87, 108, 0.1);
            border-color: #f5576c;
        }

        .option-letter {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            color: #667eea;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .option-item.selected .option-letter {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .option-text {
            font-weight: 500;
            flex: 1;
        }

        /* Feedback */
        .feedback-box {
            background: rgba(67, 233, 123, 0.1);
            border-left: 4px solid #43e97b;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
        }

        .feedback-box.show {
            display: block;
        }

        .feedback-box.correct {
            background: rgba(67, 233, 123, 0.1);
            border-left-color: #43e97b;
            color: #20a85f;
        }

        .feedback-box.incorrect {
            background: rgba(245, 87, 108, 0.1);
            border-left-color: #f5576c;
            color: #d63447;
        }

        .feedback-header {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Navigation */
        .navigation-section {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-light);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .nav-btn {
            background: var(--success-gradient);
            border: none;
            color: white;
            padding: 0.875rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
            min-height: 48px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-btn.secondary {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        /* Results Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-heavy);
            transform: scale(0.9);
            transition: var(--transition);
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .result-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .result-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            background: var(--success-gradient);
            color: white;
        }

        .result-score {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .result-subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .result-details {
            background: rgba(67, 233, 123, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #43e97b;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .modal-btn {
            flex: 1;
            background: var(--success-gradient);
            border: none;
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .main-content {
                gap: 1rem;
            }

            .question-card {
                padding: 1.5rem;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .nav-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Main Content -->
        <div class="main-content" id="mainContent" style="display: none;">
            <!-- Exam Header -->
            <header class="exam-header">
                <div class="header-content">
                    <div>
                        <h1 class="exam-title">
                            <i class="fas fa-brain"></i>
                            Practice Exam
                        </h1>
                        <div style="font-size: 0.9rem; color: #666; margin-top: 0.5rem;">
                            <span id="headerSubject">Subject</span> • <span id="headerTopics">Topics</span>
                        </div>
                    </div>
                    <div class="header-stats">
                        <div class="stat-item">
                            <span>Question</span>
                            <span class="stat-value" id="currentQuestion">1</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Question Card -->
            <section class="question-card" id="questionCard">
                <div class="question-header">
                    <div class="question-number" id="questionNumber">Question 1</div>
                </div>
                <div class="question-text" id="questionText">
                    Loading question...
                </div>
                <div id="questionImageContainer" style="margin: 1rem 0; text-align: center;">
                    <!-- Question image will be populated here -->
                </div>
                <div class="feedback-box" id="feedbackBox"></div>
                <div class="options-grid" id="optionsGrid">
                    <!-- Options will be populated here -->
                </div>
            </section>

            <!-- Navigation -->
            <section class="navigation-section">
                <div class="nav-buttons">
                    <button class="nav-btn secondary" id="prevBtn" disabled>
                        <i class="fas fa-chevron-left"></i>
                        Previous
                    </button>
                    <button class="nav-btn" id="nextBtn">
                        Next
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <button class="nav-btn" id="finishBtn" style="display:none;">
                        <i class="fas fa-check-circle"></i>
                        Finish
                    </button>
                </div>
            </section>
        </div>

        <!-- Loading Screen -->
        <div id="loadingScreen" style="display: flex; align-items: center; justify-content: center; flex: 1; color: white;">
            <div style="text-align: center;">
                <div style="width: 60px; height: 60px; border: 4px solid rgba(255, 255, 255, 0.2); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem;"></div>
                <p style="font-size: 1.2rem; font-weight: 600;">Loading your practice exam...</p>
            </div>
        </div>
    </div>

    <!-- Results Modal -->
    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <div class="result-header">
                <div class="result-icon">
                    <i class="fas fa-star"></i>
                </div>
                <div class="result-score" id="finalScore">0%</div>
                <div class="result-subtitle">Practice Completed!</div>
            </div>
            <div class="result-details">
                <div class="result-stats">
                    <div class="stat-card">
                        <div class="stat-number" id="correctAnswers">0</div>
                        <div class="stat-label">Correct</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalQuestions">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn" id="retakeBtn" onclick="retakePractice()">
                    <i class="fas fa-redo"></i>
                    Retake
                </button>
                <button class="modal-btn" style="background: rgba(102, 126, 234, 0.1); color: #667eea;" id="backBtn" onclick="goBack()">
                    <i class="fas fa-home"></i>
                    Back
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const subjectId = new URLSearchParams(window.location.search).get('subject_id');
        const sessionId = new URLSearchParams(window.location.search).get('session');
        const practiceTopics = JSON.parse(sessionStorage.getItem('practiceTopics') || '[]');

        // Global variables
        let questions = [];
        let currentQuestionIndex = 0;
        let answers = {};
        let answeredCorrectly = new Set();

        // DOM elements
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');
        const questionCard = document.getElementById('questionCard');
        const questionText = document.getElementById('questionText');
        const optionsGrid = document.getElementById('optionsGrid');
        const currentQuestionDisplay = document.getElementById('currentQuestion');
        const questionNumber = document.getElementById('questionNumber');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const finishBtn = document.getElementById('finishBtn');
        const resultModal = document.getElementById('resultModal');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadQuestions();
        });

        // Load questions from selected topics
        async function loadQuestions() {
            try {
                const topicsParam = practiceTopics.join(',');
                console.log('[DEBUG] Loading questions from topics:', practiceTopics);
                console.log('[DEBUG] Topics param string:', topicsParam);
                console.log('[DEBUG] Subject ID:', subjectId);
                console.log('[DEBUG] Session ID:', sessionId);
                
                if (!topicsParam || topicsParam.trim() === '') {
                    throw new Error('No topics selected');
                }
                
                const url = `/api/practice-questions/${subjectId}?topics=${encodeURIComponent(topicsParam)}&session=${encodeURIComponent(sessionId || '')}`;
                console.log('[DEBUG] API URL:', url);
                
                const response = await fetch(url);
                
                console.log('[DEBUG] Response status:', response.status);
                const responseData = await response.json();
                console.log('[DEBUG] Response data:', responseData);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${JSON.stringify(responseData)}`);
                }
                
                // Handle both array and object responses
                questions = Array.isArray(responseData) ? responseData : (responseData.questions || []);
                console.log('[DEBUG] Questions loaded:', questions.length);
                
                if (questions.length > 0) {
                    console.log('[DEBUG] First question:', questions[0]);
                }
                
                if (questions.length === 0) {
                    mainContent.innerHTML = `
                        <div style="text-align: center; padding: 3rem; color: #666;">
                            <i class="fas fa-inbox" style="font-size: 3rem; margin-bottom: 1rem; display: block; color: #667eea;"></i>
                            <p style="color: white; margin-bottom: 1.5rem;">No questions found for selected topics and session.</p>
                            <div style="background: rgba(255,255,255,0.1); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: white; text-align: left; font-size: 0.9rem;">
                                <p><strong>Debug Info:</strong></p>
                                <p>Topics: ${topicsParam}</p>
                                <p>Session: ${sessionId}</p>
                                <p>Subject ID: ${subjectId}</p>
                            </div>
                            <button onclick="goBack()" class="nav-btn" style="margin-top: 1rem; max-width: 200px;">Go Back</button>
                        </div>
                    `;
                    loadingScreen.style.display = 'none';
                    return;
                }

                // Display session info
                document.getElementById('headerSubject').textContent = sessionStorage.getItem('selectedSubject') || 'Subject';
                document.getElementById('headerTopics').textContent = `${practiceTopics.length} topics`;

                loadingScreen.style.display = 'none';
                mainContent.style.display = 'flex';
                
                displayQuestion(0);
                
            } catch (error) {
                console.error('Error loading questions:', error);
                console.error('Stack trace:', error.stack);
                loadingScreen.innerHTML = `
                    <div style="text-align: center; color: #f5576c; padding: 2rem;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>
                        <p style="margin-bottom: 1rem; font-weight: 600;">Failed to load questions.</p>
                        <p style="font-size: 0.9rem; margin-bottom: 1.5rem; opacity: 0.9;">${error.message}</p>
                        <button onclick="location.reload()" class="nav-btn" style="margin-top: 1rem; max-width: 200px;">Reload</button>
                    </div>
                `;
            }
        }

        // Display a question
        function displayQuestion(index, clearFeedback = true) {
            if (index < 0 || index >= questions.length) return;
            
            currentQuestionIndex = index;
            const question = questions[index];
            
            // Update header
            currentQuestionDisplay.textContent = index + 1;
            questionNumber.textContent = `Question ${index + 1}`;
            questionText.textContent = question.question_text;
            
            // Handle question image
            const imageContainer = document.getElementById('questionImageContainer');
            if (question.question_image) {
                imageContainer.innerHTML = `<img src="/static/${question.question_image}" alt="Question image" style="max-width: 100%; max-height: 400px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">`;
            } else {
                imageContainer.innerHTML = '';
            }
            
            // Display options based on question type
            let options;
            if (question.question_type === 'true_false') {
                options = [
                    { letter: 'T', text: 'True' },
                    { letter: 'F', text: 'False' }
                ];
            } else {
                options = [
                    { letter: 'A', text: question.option_a },
                    { letter: 'B', text: question.option_b },
                    { letter: 'C', text: question.option_c },
                    { letter: 'D', text: question.option_d }
                ];
            }
            
            optionsGrid.innerHTML = options.map((option, idx) => {
                const letter = option.letter;
                const isSelected = answers[index] === letter;
                const isCorrect = letter === question.correct_answer;
                const isAnswered = answers[index] !== undefined;
                
                let className = 'option-item';
                if (isSelected && isAnswered) {
                    className += isCorrect ? ' correct selected' : ' incorrect selected';
                }
                
                return `
                    <div class="${className}" onclick="selectAnswer(${index}, '${letter}')">
                        <div class="option-letter">${letter}</div>
                        <div class="option-text">${option.text}</div>
                    </div>
                `;
            }).join('');
            
            // Update navigation buttons
            prevBtn.disabled = index === 0;
            nextBtn.style.display = index < questions.length - 1 ? 'flex' : 'none';
            finishBtn.style.display = index === questions.length - 1 ? 'flex' : 'none';
            
            // Clear feedback only when navigating to a new question (not after selection)
            if (clearFeedback) {
                const feedbackBox = document.getElementById('feedbackBox');
                feedbackBox.classList.remove('show');
            }
        }

        // Select an answer
        function selectAnswer(questionIndex, letter) {
            answers[questionIndex] = letter;
            const question = questions[questionIndex];
            
            // Check if correct
            const isCorrect = letter === question.correct_answer;
            if (isCorrect) {
                answeredCorrectly.add(questionIndex);
            } else {
                answeredCorrectly.delete(questionIndex);
            }
            
            // Show feedback
            const feedbackBox = document.getElementById('feedbackBox');
            if (isCorrect) {
                feedbackBox.className = 'feedback-box show correct';
                feedbackBox.innerHTML = `
                    <div class="feedback-header"><i class="fas fa-check-circle"></i> Correct!</div>
                    <p style="margin: 0;">Great! You selected the right answer.</p>
                `;
            } else {
                feedbackBox.className = 'feedback-box show incorrect';
                feedbackBox.innerHTML = `
                    <div class="feedback-header"><i class="fas fa-times-circle"></i> Not quite right</div>
                    <p style="margin: 0;">The correct answer is <strong>${question.correct_answer}</strong>.</p>
                `;
            }
            
            // Redisplay question to update option styling but keep feedback visible
            displayQuestion(questionIndex, false);
        }

        // Navigation buttons
        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < questions.length - 1) {
                displayQuestion(currentQuestionIndex + 1, true); // Clear feedback when moving forward
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                displayQuestion(currentQuestionIndex - 1, true); // Clear feedback when moving backward
            }
        });

        finishBtn.addEventListener('click', showResults);

        // Show results
        function showResults() {
            const correctCount = answeredCorrectly.size;
            const totalCount = questions.length;
            const percentage = Math.round((correctCount / totalCount) * 100);
            
            document.getElementById('finalScore').textContent = percentage + '%';
            document.getElementById('correctAnswers').textContent = correctCount;
            document.getElementById('totalQuestions').textContent = totalCount;
            
            resultModal.classList.add('show');
        }

        // Retake practice
        function retakePractice() {
            window.location.reload();
        }

        // Go back
        function goBack() {
            window.history.back();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextBtn.click();
            if (e.key === 'ArrowLeft') prevBtn.click();
        });
    </script>
</body>
